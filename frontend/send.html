<!DOCTYPE html>

<html>

<head>

<title>Send Tokens</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Send Tokens</h2>

<input id="receiver" placeholder="Receiver ID">

<input id="amount" placeholder="Amount">

<button onclick="send()">Send</button>

<div id="msg"></div>

</div>

<script>

const API="http://localhost:5000/api"

async function send(){

let senderId=localStorage.getItem("userId")
let receiver=document.getElementById("receiver").value
let amount=document.getElementById("amount").value

let res=await fetch(API+"/transaction/send",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({senderId,receiverId:receiver,amount})

})

let data=await res.json()

if(data.warning){

document.getElementById("msg").innerHTML=
"<span style='color:red'>"+data.warning+"</span>"

}else{

document.getElementById("msg").innerText="Transaction Successful"

}

}

</script>

</body>
</html>
