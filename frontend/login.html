<!DOCTYPE html>
<html>

<head>

<title>CampusChain Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- LOGIN FORM -->

<div id="loginForm">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="switch" onclick="showRegister()">New user? Register here</p>

</div>


<!-- REGISTER FORM -->

<div id="registerForm" class="hidden">

<h2>Register</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p class="switch" onclick="showLogin()">Already registered? Login</p>

</div>

<p id="msg" style="text-align:center;"></p>

</div>

<script>

const API="http://localhost:5000/api"

function showRegister(){

document.getElementById("loginForm").classList.add("hidden")
document.getElementById("registerForm").classList.remove("hidden")

}

function showLogin(){

document.getElementById("registerForm").classList.add("hidden")
document.getElementById("loginForm").classList.remove("hidden")

}


async function register(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value

let res=await fetch(API+"/auth/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email,password})

})

document.getElementById("msg").innerText="Registration Successful. Please login."

showLogin()

}


async function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let res=await fetch(API+"/auth/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})

})

let user=await res.json()

if(user.id){

localStorage.setItem("userId",user.id)

document.getElementById("msg").innerText="Login Successful"

setTimeout(()=>{

window.location.href="wallet.html"

},1000)

}else{

document.getElementById("msg").innerText="Invalid login"

}

}

</script>

</body>
</html>
